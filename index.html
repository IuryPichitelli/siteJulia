<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporizador Regressivo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 300;
            color: #00d4ff;
        }

        .countdown {
            display: flex;
            gap: 20px;
        }

        .time-box {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            min-width: 80px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .number {
            display: block;
            font-size: 2.5em;
            font-weight: bold;
        }

        .label {
            font-size: 0.8em;
            text-transform: uppercase;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contagem Regressiva</h1>
        <div class="countdown">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>
    </div>

    <script>
        // DEFINA A DATA DE DESTINO AQUI
        // Formato: "Mês Dia, Ano Hora:Minuto:Segundo"
        const targetDate = new Date("Dec 31, 2026 23:59:59").getTime();

        const updateTimer = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Cálculos matemáticos para dias, horas, minutos e segundos
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Inserindo os resultados nos elementos HTML
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            // Se a contagem terminar
            if (distance < 0) {
                clearInterval(updateTimer);
                document.querySelector(".countdown").innerHTML = "<h2>Tempo Esgotado!</h2>";
            }
        }, 1000);
    </script>

</body>
</html>
